<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title">
    <title id="title">DeLayne Russell striped favicon</title>
    <defs>
        <linearGradient id="redGradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#710000"/>
            <stop offset="0.52" stop-color="#8f0000"/>
            <stop offset="1" stop-color="#760000"/>
        </linearGradient>

        <linearGradient id="blackGradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0c0d0d"/>
            <stop offset="1" stop-color="#151515"/>
        </linearGradient>

        <clipPath id="iconClip">
            <rect width="128" height="128" rx="18"/>
        </clipPath>
    </defs>

    <g clip-path="url(#iconClip)">
        <rect width="128" height="128" fill="url(#redGradient)"/>

        <path d="M-28 18 136-22 136 2 -28 42Z" fill="url(#blackGradient)"/>
        <path d="M-28 62 136 22 136 46 -28 86Z" fill="url(#blackGradient)"/>
        <path d="M-28 106 136 66 136 90 -28 130Z" fill="url(#blackGradient)"/>
        <path d="M-28 150 136 110 136 134 -28 174Z" fill="url(#blackGradient)"/>

        <rect width="128" height="128" fill="#0c0d0d" opacity="0.08"/>
        <rect x="1" y="1" width="126" height="126" rx="17" fill="none" stroke="#151515" stroke-opacity="0.45" stroke-width="2"/>
    </g>
</svg>
